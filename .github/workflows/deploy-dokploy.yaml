name: Deploy to Dokploy
on:
  push:
    branches:
      - dev # Deploys every time you push to dev
  workflow_dispatch:
    inputs:
      nx_cloud_enabled:
        description: "Enable Nx Cloud? (true/false) — overrides the NX_CLOUD_ENABLED repo variable"
        required: false
        default: ""

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    env:
      # NX_NO_CLOUD=true tells Nx to skip cloud entirely (native Nx env var).
      # Priority: manual dispatch input → NX_CLOUD_ENABLED repo variable → default on.
      NX_NO_CLOUD: >-
        ${{
          (inputs.nx_cloud_enabled != '' && inputs.nx_cloud_enabled == 'false') ||
          (inputs.nx_cloud_enabled == '' && vars.NX_CLOUD_ENABLED == 'false')
        }}

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        uses: ./.github/actions/yarn-install

      - name: Nx Cloud status
        run: echo "NX_NO_CLOUD = $NX_NO_CLOUD"

      # Warm up Nx Cache (Using Nx Cloud if enabled).
      # When NX_NO_CLOUD=true, Nx runs locally — no caching, but no auth errors either.
      - name: Nx Build
        run: npx nx run-many -t build -p twenty-server twenty-front --parallel=3
        env:
          NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build & Push the production image
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: packages/twenty-docker/twenty/Dockerfile
          target: twenty
          push: true
          tags: ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NX_NO_CLOUD=${{ env.NX_NO_CLOUD }}
            NX_CLOUD_ACCESS_TOKEN=${{ secrets.NX_CLOUD_ACCESS_TOKEN }}

      - name: Trigger Dokploy Webhook
        run: |
          curl -X POST "${{ secrets.DOKPLOY_WEBHOOK_URL }}" \
               -H "Authorization: Bearer ${{ secrets.DOKPLOY_TOKEN }}" \
               -H "Content-Type: application/json" \
               -H "X-GitHub-Event: push" \
               -d '{"ref": "${{ github.ref }}"}'
