name: Deploy to Dokploy
on:
  push:
    branches:
      - dev # Deploys every time you push to dev
  workflow_dispatch:
    inputs:
      nx_cloud_enabled:
        description: "Enable Nx Cloud? (true/false) — overrides the NX_CLOUD_ENABLED repo variable"
        required: false
        default: ""

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    # Resolve whether Nx Cloud is on or off.
    # Priority: manual dispatch input → repo variable NX_CLOUD_ENABLED → default (true)
    env:
      NX_CLOUD_ON: >-
        ${{
          inputs.nx_cloud_enabled != '' && inputs.nx_cloud_enabled ||
          vars.NX_CLOUD_ENABLED != '' && vars.NX_CLOUD_ENABLED ||
          'true'
        }}

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        uses: ./.github/actions/yarn-install

      # Show whether Nx Cloud is active so it's visible in logs
      - name: Nx Cloud status
        run: |
          echo "NX_CLOUD_ON = $NX_CLOUD_ON"

      # Warm up Nx Cache (Using Nx Cloud if enabled)
      # When disabled, Nx still runs locally — no caching, but no auth errors either.
      - name: Nx Build
        run: npx nx run-many -t build -p twenty-server twenty-front --parallel=3
        env:
          NX_CLOUD_ACCESS_TOKEN: ${{ env.NX_CLOUD_ON == 'true' && secrets.NX_CLOUD_ACCESS_TOKEN || '' }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build & Push the production image
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: packages/twenty-docker/twenty/Dockerfile
          target: twenty
          push: true
          tags: ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Only pass Nx Cloud token into Docker when Nx Cloud is enabled
          build-args: |
            NX_CLOUD_ACCESS_TOKEN=${{ env.NX_CLOUD_ON == 'true' && secrets.NX_CLOUD_ACCESS_TOKEN || '' }}

      - name: Trigger Dokploy Webhook
        run: |
          curl -X POST "${{ secrets.DOKPLOY_WEBHOOK_URL }}" \
               -H "Authorization: Bearer ${{ secrets.DOKPLOY_TOKEN }}" \
               -H "Content-Type: application/json" \
               -H "X-GitHub-Event: push" \
               -d '{"ref": "${{ github.ref }}"}'
