name: "Release: create"

permissions:
  contents: write
  pull-requests: write
  packages: write

on:
  workflow_dispatch:
    inputs:
      version:
        required: true
        description: Version to release, without the v (e.g. 1.2.3)
      create_release:
        type: boolean
        default: true
        description: Create a release after merging the PR

defaults:
  run:
    shell: bash --noprofile --norc -euo pipefail {0}

jobs:
  create_pr:
    timeout-minutes: 10
    outputs:
      version: ${{ steps.sanitize.outputs.version }}
      image_sha: ${{ steps.get_sha.outputs.sha }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Get commit SHA
        id: get_sha
        run: printf 'sha=%s\n' "$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Sanitize version
        id: sanitize
        env:
          RAW_VERSION: ${{ github.event.inputs.version }}
        run: |
          VERSION="${RAW_VERSION#v}"
          printf 'version=%s\n' "$VERSION" >> "$GITHUB_OUTPUT"

      - name: Update versions
        env:
          VERSION: ${{ steps.sanitize.outputs.version }}
        run: |
          printf '%s\n' "$VERSION" > version.txt

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: release/${{ steps.sanitize.outputs.version }}
          commit-message: "chore: release v${{ steps.sanitize.outputs.version }}"
          committer: Github Action Deploy <github-action-deploy@twenty.com>
          author: Github Action Deploy <github-action-deploy@twenty.com>
          title: Release v${{ steps.sanitize.outputs.version }}
          labels: |
            release
            ${{ github.event.inputs.create_release == true && 'create_release' || '' }}

  tag_image:
    name: Tag GHCR image with release version
    timeout-minutes: 10
    runs-on: ubuntu-latest
    needs: create_pr
    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull SHA-tagged image and re-tag as release version
        env:
          IMAGE: ghcr.io/${{ github.repository }}
          VERSION: ${{ needs.create_pr.outputs.version }}
          SHA: ${{ needs.create_pr.outputs.image_sha }}
        run: |
          echo "Promoting image sha-${SHA} → v${VERSION}"
          docker pull "${IMAGE}:sha-${SHA}"
          docker tag  "${IMAGE}:sha-${SHA}" "${IMAGE}:v${VERSION}"
          docker push "${IMAGE}:v${VERSION}"
